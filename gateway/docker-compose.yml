services:
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '80:80'   # Ruch HTTP
      - '81:81'   # Panel administracyjny NPM
      - '443:443' # Ruch HTTPS
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - proxy-nw

networks:
  proxy-nw:
    external: true