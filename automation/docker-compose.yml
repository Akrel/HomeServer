version: '3.8'
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    environment:
      - DB_TYPE=${DB_TYPE}
      - DB_POSTGRESDB_HOST=${DB_HOST}
      - DB_POSTGRESDB_PORT=${DB_PORT}
      - DB_POSTGRESDB_DATABASE=${DB_NAME}
      - DB_POSTGRESDB_USER=${DB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASS}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - N8N_WEBHOOK_TUNNEL_URL=${WEBHOOK_URL}
      - N8N_HOST=${N8N_HOST}
    ports:
      - 5678:5678
    volumes:
      - n8n_storage:/home/node/.n8n
    networks:
      compose_databases_network:
      network_default:
      n8n_net:
        ipv4_address: ${WEBHOOK_IP}
    openclaw-gateway:
      image: openclaw/core:latest
      container_name: openclaw-gateway
      environment:
        - OPENCLAW_GATEWAY_TOKEN=SuperTajneHaslo2026!
        # Konfiguracja pod OpenRouter
        - OPENROUTER_API_KEY= ""
        - OPENAI_BASE_URL=https://openrouter.ai/api/v1
        - TZ=Europe/Warsaw
      volumes:
        - ./data:/home/node/.openclaw
        - ./workspace:/home/node/.openclaw/workspace
      ports:
        - "18789:18789"
      restart: unless-stopped
      networks:
        n8n_net:
    openclaw-cli:
      image: openclaw/core:latest
      container_name: openclaw-cli
      network_mode: "service:openclaw-gateway"
      stdin_open: true
      tty: true
      environment:
        - OPENCLAW_GATEWAY_TOKEN=SuperTajneHaslo2026!
      volumes:
        - ./data:/home/node/.openclaw
      entrypoint: [ "node", "dist/index.js" ]
      depends_on:
        - openclaw-gateway
      networks:
        n8n_net:

volumes:
  n8n_storage:
  openclaw-gateway:
  openclaw-cli:
networks:
  n8n_net:
    external: true
  compose_databases_network:
    external: true
  network_default:
    external: true